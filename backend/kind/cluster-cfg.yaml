kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.35.0
    labels:
      name: cluster-controller
    extraMounts:
      - hostPath: /home/slins/Programming/Web/App/backend/data/grafana
        containerPath: /mnt/grafana-data
      - hostPath: /home/slins/Programming/Web/App/backend/data/prometheus
        containerPath: /mnt/prometheus-data
      - hostPath: /home/slins/Programming/Web/App/backend/data/registry
        containerPath: /mnt/registry-data
      - hostPath: /home/slins/Programming/Web/App/backend/../frontend
        containerPath: /mnt/frontend-dev-data
  - role: worker
    image: kindest/node:v1.35.0
    labels:
      name: cluster-worker
    extraMounts:
      - hostPath: /home/slins/Programming/Web/App/backend/data/grafana
        containerPath: /mnt/grafana-data
      - hostPath: /home/slins/Programming/Web/App/backend/data/prometheus
        containerPath: /mnt/prometheus-data
      - hostPath: /home/slins/Programming/Web/App/backend/data/registry
        containerPath: /mnt/registry-data
      - hostPath: /home/slins/Programming/Web/App/backend/data/jaeger
        containerPath: /mnt/jaeger-data
      - hostPath: /home/slins/Programming/Web/App/backend/../frontend
        containerPath: /mnt/frontend-dev-data
