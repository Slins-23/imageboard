kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.35.0
    labels:
      name: cluster-controller
    extraMounts:
      - hostPath: ${PROJECT_DIR}/data
        containerPath: /mnt/data
      - hostPath: ${PROJECT_DIR}/../frontend
        containerPath: /mnt/frontend-dev
  - role: worker
    image: kindest/node:v1.35.0
    labels:
      name: cluster-worker
    extraMounts:
      - hostPath: ${PROJECT_DIR}/data
        containerPath: /mnt/data
      - hostPath: ${PROJECT_DIR}/../frontend
        containerPath: /mnt/frontend-dev