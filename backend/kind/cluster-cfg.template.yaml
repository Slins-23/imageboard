kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.35.0
    labels:
      name: cluster-controller
    extraMounts:
      - hostPath: ${BACKEND_DIR}/data
        containerPath: /mnt/data
      - hostPath: ${BACKEND_DIR}/apps
        containerPath: /mnt/apps
      - hostPath: ${BACKEND_DIR}/../frontend
        containerPath: /mnt/apps/frontend-dev
      
  - role: worker
    image: kindest/node:v1.35.0
    labels:
      name: cluster-worker
    extraMounts:
      - hostPath: ${BACKEND_DIR}/data
        containerPath: /mnt/data
      - hostPath: ${BACKEND_DIR}/apps
        containerPath: /mnt/apps
      - hostPath: ${BACKEND_DIR}/../frontend
        containerPath: /mnt/apps/frontend-dev