kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    image: kindest/node:v1.35.0
    labels:
      name: cluster-controller-vm-01
    extraMounts:
      - hostPath: ${PROJECT_DIR}/data/grafana
        containerPath: /mnt/grafana-data
      - hostPath: ${PROJECT_DIR}/data/prometheus
        containerPath: /mnt/prometheus-data
      - hostPath: ${PROJECT_DIR}/data/registry
        containerPath: /mnt/registry-data
      - hostPath: ${PROJECT_DIR}/../frontend
        containerPath: /mnt/frontend-dev-data
  #- role: control-plane
  #  image: kindest/node-custom:v1.35.0
  #  labels:
  #    name: cluster-controller-vm-02
  #- role: control-plane
  #  image: kindest/node-custom:v1.35.0
  #  labels:
  #    name: cluster-controller-vm-03
  - role: worker
    image: kindest/node:v1.35.0
    labels:
      name: cluster-registry-vm
    extraMounts:
      - hostPath: ${PROJECT_DIR}/data/grafana
        containerPath: /mnt/grafana-data
      - hostPath: ${PROJECT_DIR}/data/prometheus
        containerPath: /mnt/prometheus-data
      - hostPath: ${PROJECT_DIR}/data/registry
        containerPath: /mnt/registry-data
      - hostPath: ${PROJECT_DIR}/data/jaeger
        containerPath: /mnt/jaeger-data
      - hostPath: ${PROJECT_DIR}/../frontend
        containerPath: /mnt/frontend-dev-data
  - role: worker
    image: kindest/node:v1.35.0
    labels:
      name: postgres-proto-vm
    extraMounts:
      - hostPath: ${PROJECT_DIR}/data/grafana
        containerPath: /mnt/grafana-data
      - hostPath: ${PROJECT_DIR}/data/prometheus
        containerPath: /mnt/prometheus-data
      - hostPath: ${PROJECT_DIR}/data/registry
        containerPath: /mnt/registry-data
      - hostPath: ${PROJECT_DIR}/data/jaeger
        containerPath: /mnt/jaeger-data
      - hostPath: ${PROJECT_DIR}/../frontend
        containerPath: /mnt/frontend-dev-data
